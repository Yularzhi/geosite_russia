name: Build geosite.dat

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build text lists
        run: python scripts/build_lists.py

      - name: Clone domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git dlc

      - name: Build geosite.dat
        run: |
          cd dlc
          go mod download
          go run ./ --datapath=../data
          mv dlc.dat ../geosite.dat

      - name: Create checksum
        run: sha256sum geosite.dat > geosite.dat.sha256

      - name: Commit generated data folder to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: update generated source lists"
          git push

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release
          path: release-branch

      - name: Publish files to release branch
        run: |
          cp geosite.dat release-branch/geosite.dat
          cp geosite.dat.sha256 release-branch/geosite.dat.sha256

          cd release-branch
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add geosite.dat geosite.dat.sha256
          git diff --cached --quiet || git commit -m "chore: publish latest geosite.dat"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geosite-dat
          path: |
            geosite.dat
            geosite.dat.sha256
