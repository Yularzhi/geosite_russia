name: Build geosite.dat

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: latest-geosite

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build source lists
        run: python scripts/build_lists.py

      - name: Build geosite.dat
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc
          cd dlc
          go mod download
          go run ./ --datapath=../data
          mv dlc.dat ../geosite.dat

      - name: Create checksum
        run: sha256sum geosite.dat > geosite.dat.sha256

      - name: Commit generated data to main
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore: update generated source lists"
          git push

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: release
          path: release-branch

      - name: Publish files to release branch
        run: |
          find release-branch -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp geosite.dat release-branch/geosite.dat
          cp geosite.dat.sha256 release-branch/geosite.dat.sha256

          cd release-branch
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "chore: publish latest geosite.dat" || echo "No changes to commit"
          git push

      - name: Create or update release tag
        run: |
          git tag -f "${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}" --force

      - name: Delete existing release assets if release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 && \
          gh release delete-asset "${RELEASE_TAG}" geosite.dat -y || true
          gh release view "${RELEASE_TAG}" >/dev/null 2>&1 && \
          gh release delete-asset "${RELEASE_TAG}" geosite.dat.sha256 -y || true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Latest geosite.dat
          body: |
            Automated latest build of geosite.dat

            Raw URL:
            https://raw.githubusercontent.com/yularzhi/geosite_russia/release/geosite.dat
          files: |
            geosite.dat
            geosite.dat.sha256
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geosite-dat
          path: |
            geosite.dat
            geosite.dat.sha256
